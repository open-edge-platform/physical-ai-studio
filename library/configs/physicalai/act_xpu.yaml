# ACT Policy Training Configuration (XPU)
# Train Action Chunking Transformer on Intel XPU
#
# Usage:
#   physicalai fit --config configs/physicalai/act_xpu.yaml

model:
  class_path: physicalai.policies.ACT

data:
  class_path: physicalai.data.lerobot.LeRobotDataModule
  init_args:
    repo_id: "lerobot/pusht"
    train_batch_size: 64
    data_format: "physicalai"
    val_gym:
      class_path: physicalai.gyms.pusht.PushTGym
